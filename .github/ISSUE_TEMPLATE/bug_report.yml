name: Bug report
description: Report a reproducible problem in TabShelf
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: input
    id: extension_version
    attributes:
      label: TabShelf version
      description: "Example: 1.1.0"
      placeholder: "1.1.0"
    validations:
      required: true
  - type: input
    id: chrome_version
    attributes:
      label: Chrome version
      description: "Open chrome://version"
      placeholder: "123.0.x"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - ChromeOS
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a new tab
        2. Create a new space
        3. Drag active tab into the space
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or recording
      description: Drag and drop images/videos here if available.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Any related details, logs, or workaround.
    validations:
      required: false
